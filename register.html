</head>

<body>

<header>

<div class="top-header">

<img src="images/anitslogo.jpg" class="logo">

<div class="heading">
<h2>Anil Neerukonda Institute of Technology & Sciences</h2>
<h4>Campus Placement Portal</h4>
</div>

</div>

<nav>

<section class="register-container">

<h2>Student Registration</h2>

<form action="success.html">

<fieldset>

<legend>Personal Information</legend>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Password</label>
<input type="password" placeholder="Enter password" required>

<label>Email Address</label>
<input type="email" placeholder="abc@example.com" required>

<label>Mobile Number</label>
<input type="tel" placeholder="9876543210">

<label>Age</label>
<input type="number">

<label>Date of Birth</label>
<input type="date">

<label>Preferred Time</label>
<input type="time">

<label>Registration Date & Time</label>
<input type="datetime-local">

</fieldset>

<fieldset>

<legend>Academic Information</legend>

<label>Department</label>

<select>

<option>Computer Science</option>

<option>Information Technology</option>

<option>Artificial Intelligence</option>

<option>Data Science</option>

<option>ECE</option>

<option>EEE</option>

<option>Mechanical</option>

<option>Civil</option>

</select>

<label>Programming Languages</label>

<div class="checkbox-group">

<label><input type="checkbox"> C</label>

<label><input type="checkbox"> C++</label>

<label><input type="checkbox"> Java</label>

<label><input type="checkbox"> Python</label>

</div>

<label>Gender</label>

<div class="radio-group">

<label><input type="radio" name="gender"> Male</label>

<label><input type="radio" name="gender"> Female</label>

<label><input type="radio" name="gender"> Other</label>

</div>

<label>Skills</label>

<div class="checkbox-group">

<label><input type="checkbox"> HTML</label>

<label><input type="checkbox"> CSS</label>

<label><input type="checkbox"> JavaScript</label>

<label><input type="checkbox"> Java</label>

<label><input type="checkbox"> Python</label>

</div>

</fieldset>

<fieldset>

<legend>Online Information</legend>

<label>Portfolio Website</label>
<input type="url" placeholder="https://example.com">

<label>Search Course</label>
<input type="search">

<label>Upload Resume</label>
<input type="file">

<label>Programming Skill Level</label>

<div class="slider-box">

<span>Beginner</span>

<input type="range" min="0" max="100">

<span>Expert</span>

</div>

<label>Address</label>

<textarea rows="4"></textarea>

</fieldset>

<label>

<input type="checkbox" required>

I hereby declare that the information provided above is true and correct.

</label>

<br><br>

<input type="submit" value="Register" class="btn">

<input type="reset" value="Reset" class="btn">

</form>

</section>

<footer>

© 2025 ANITS | Department of Training & Placement

</footer>

</body>
</html>
